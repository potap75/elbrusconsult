# /etc/nginx/sites-available/adengine.conf
#
# Ads engine (remote MCP server) at mcp.elbruscloud.com. bootstrap.sh installs
# this file into sites-available on every deploy but only symlinks it into
# sites-enabled once the TLS cert exists, so a fresh VM passes `nginx -t`
# before certbot has run. Obtain the cert with:
#
#   sudo certbot --nginx -d mcp.elbruscloud.com
#
# (The :80 server in elbrus.conf already answers for mcp.elbruscloud.com and
# serves the ACME webroot, so issuance works before this block is enabled.)
#
# Auth (bearer token) is enforced by the adengine app itself; nginx adds TLS,
# rate limiting, and proxy hygiene. Everything except /mcp and /healthz is
# refused.

upstream elbrus_adengine {
    server unix:/run/elbrus/adengine.sock fail_timeout=0;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.elbruscloud.com;

    ssl_certificate     /etc/letsencrypt/live/mcp.elbruscloud.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.elbruscloud.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;

    client_max_body_size 5M;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_redirect off;

    location = /healthz {
        proxy_pass http://elbrus_adengine;
        access_log off;
    }

    location /mcp {
        limit_req zone=elbrus_default burst=20 nodelay;
        limit_req_status 429;
        # Streamable HTTP (may include SSE responses): no buffering, and a
        # generous read timeout for long-running tool calls.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_http_version 1.1;
        # NOTE: defining any proxy_set_header here cancels inheritance of the
        # server-level set, so the full set must be repeated. Without Host the
        # engine sees the upstream name and rejects the request with 421.
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://elbrus_adengine;
    }

    location / {
        return 444;
    }
}
