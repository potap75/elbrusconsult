# /etc/nginx/sites-available/elbrus.conf
#
# Replace ``elbruscloud.example`` with the production domain once it is
# purchased + DNS is pointed. Then run certbot to provision the TLS cert.

upstream elbrus_app {
    server unix:/run/elbrus/gunicorn.sock fail_timeout=0;
}

# HTTP -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name elbruscloud.example www.elbruscloud.example;

    # Let's Encrypt webroot challenge:
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elbruscloud.example www.elbruscloud.example;

    ssl_certificate     /etc/letsencrypt/live/elbruscloud.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elbruscloud.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25M;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/rss+xml image/svg+xml;

    # Static & media served directly by nginx.
    location /static/ {
        alias /opt/elbrus/app/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /opt/elbrus/app/backend/media/;
        access_log off;
        expires 30d;
    }

    location = /robots.txt {
        proxy_pass http://elbrus_app;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://elbrus_app;
    }
    location = /favicon.ico {
        alias /opt/elbrus/app/backend/staticfiles/img/favicon.svg;
        access_log off;
        expires 30d;
    }

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://elbrus_app;
    }
}
