# /etc/nginx/sites-available/elbrus.conf
#
# Replace ``elbruscloud.example`` with the production domain once it is
# purchased + DNS is pointed. Then run certbot to provision the TLS cert.

# Rate-limit pool keyed on client IP. 10 r/s sustained, burst handled at the
# location level. ``$binary_remote_addr`` keeps the key compact (~16 B), so
# 10 MB stores ~640k IPs. This sits at http{} scope (sites-enabled files are
# included inside http{} by the default Ubuntu nginx.conf).
limit_req_zone $binary_remote_addr zone=elbrus_default:10m rate=10r/s;

# Don't leak the nginx version number in error pages or the Server header.
server_tokens off;

upstream elbrus_app {
    server unix:/run/elbrus/gunicorn.sock fail_timeout=0;
}

# HTTP -> HTTPS redirect.
server {
    listen 80;
    listen [::]:80;
    server_name elbruscloud.example www.elbruscloud.example;

    # Let's Encrypt webroot challenge:
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name elbruscloud.example www.elbruscloud.example;

    # --- TLS ---------------------------------------------------------------
    ssl_certificate     /etc/letsencrypt/live/elbruscloud.example/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/elbruscloud.example/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!MD5:!DSS;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    # Tickets are off so that a stolen ticket key can't be used to decrypt
    # prior sessions. PFS via the (EC)DHE handshake is preserved.
    ssl_session_tickets off;
    # OCSP stapling reduces the privacy / latency cost of revocation checks.
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # --- Security headers --------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;

    client_max_body_size 25M;
    keepalive_timeout 65;
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/rss+xml image/svg+xml;

    # --- Deny dotfiles + obviously-sensitive extensions --------------------
    # Allows /.well-known/acme-challenge/* (handled by the HTTP server above)
    # but blocks everything else like /.env, /.git, /.htaccess, ...
    location ~ /\.(?!well-known) {
        deny all;
        return 404;
    }
    location ~* \.(env|sqlite3|sqlite|bak|old|sql|swp|tmp)$ {
        deny all;
        return 404;
    }

    # --- Static & media served directly by nginx ---------------------------
    location /static/ {
        alias /opt/elbrus/app/backend/staticfiles/;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        limit_except GET HEAD { deny all; }
    }

    location /media/ {
        alias /opt/elbrus/app/backend/media/;
        access_log off;
        expires 30d;
        limit_except GET HEAD { deny all; }
    }

    location = /robots.txt {
        proxy_pass http://elbrus_app;
        access_log off;
    }
    location = /sitemap.xml {
        proxy_pass http://elbrus_app;
    }
    location = /favicon.ico {
        alias /opt/elbrus/app/backend/staticfiles/img/favicon.svg;
        access_log off;
        expires 30d;
    }

    # --- Application -------------------------------------------------------
    location / {
        # 10 r/s sustained, 20 burst, no delay (excess rejected with 429).
        limit_req zone=elbrus_default burst=20 nodelay;
        limit_req_status 429;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_pass http://elbrus_app;
    }
}
