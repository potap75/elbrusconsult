# Canonical deploy path for elbruscloud.com.
#
# Every push and PR to `main` runs the test suite + Tailwind build. Pushes
# (not PRs) additionally hand off to the existing bootstrap script on the
# production VM via `az vm run-command`, then verify the site came back up
# with a /healthz smoke check. PRs stop after tests.
#
# OIDC (federated identity) is used to authenticate to Azure - no long-lived
# secrets live in GitHub. See `infra/azure/github-actions-setup.sh` for the
# one-time identity provisioning script and the README in the same folder
# for the full setup walkthrough.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Test (pytest + tailwind build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements/*.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install Python dependencies
        run: pip install -r backend/requirements/dev.txt

      - name: Run pytest
        working-directory: backend
        run: pytest apps -x -q

      - name: Install npm dependencies
        working-directory: backend
        run: npm ci

      - name: Build Tailwind CSS (smoke)
        working-directory: backend
        run: npm run build:css

  deploy:
    name: Deploy to Azure VM
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Run bootstrap on the VM
        env:
          AZURE_RG: ${{ vars.AZURE_RG }}
          AZURE_VM: ${{ vars.AZURE_VM }}
        run: |
          set -euo pipefail
          echo "==> Invoking elbrus-bootstrap on $AZURE_VM (RG: $AZURE_RG)..."
          OUT=$(az vm run-command invoke \
            -g "$AZURE_RG" -n "$AZURE_VM" \
            --command-id RunShellScript \
            --scripts "sudo /usr/local/sbin/elbrus-bootstrap 2>&1 | tail -150" \
            -o json)
          MSG=$(jq -r '.value[0].message' <<<"$OUT")
          echo "--- bootstrap output ---"
          echo "$MSG"
          echo "--- end bootstrap output ---"
          if ! echo "$MSG" | grep -q "Bootstrap complete\."; then
            echo "::error::bootstrap did not finish with 'Bootstrap complete.'"
            exit 1
          fi

      - name: Smoke check https://elbruscloud.com/healthz
        run: |
          set -uo pipefail
          for i in 1 2 3 4 5 6; do
            if curl -fsS --max-time 10 https://elbruscloud.com/healthz; then
              echo
              echo "::notice::healthz responded OK on attempt $i"
              exit 0
            fi
            echo "attempt $i failed; sleeping 5s..."
            sleep 5
          done
          echo "::error::healthz did not respond OK after 30s"
          exit 1
