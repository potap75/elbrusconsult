<!-- Source SVG for the default OG image.

A real PNG should replace static/img/og-default.png (1200x630) for production.
Open Graph crawlers prefer raster formats. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a2f56"/>
      <stop offset="60%" stop-color="#04132b"/>
      <stop offset="100%" stop-color="#000814"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#00D9FF" stop-opacity="0.45"/>
      <stop offset="60%" stop-color="#00D9FF" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Distant topographic silhouettes for depth. -->
  <path d="M0 520 L200 320 L380 420 L560 240 L760 380 L940 280 L1200 420 L1200 630 L0 630 Z" fill="#0f4d8c" opacity="0.55"/>
  <path d="M0 580 L240 400 L420 480 L620 320 L820 440 L1000 360 L1200 480 L1200 630 L0 630 Z" fill="#039EBD" opacity="0.35"/>
  <!-- Brand mark, scaled up from the favicon geometry. -->
  <g transform="translate(60 60)">
    <polygon points="20,108 44,16 64,80 84,16 108,108" fill="#00D9FF"/>
    <polygon points="32,108 48,56 60,108" fill="#039EBD"/>
    <polygon points="68,108 80,56 96,108" fill="#039EBD"/>
  </g>
  <text x="60" y="360" font-family="Sora, Inter, system-ui, sans-serif" font-size="84" font-weight="800" fill="#ffffff">Elbrus Cloud</text>
  <text x="60" y="430" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="500" fill="#c4e2ef">Cloud Engineering &amp; Cybersecurity Excellence</text>
</svg>
