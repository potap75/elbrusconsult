<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Elbrus Cloud">
  <rect width="64" height="64" rx="12" fill="#000000"/>
  <!-- Outer twin peaks forming the "M" mark. -->
  <polygon points="10,54 22,8 32,40 42,8 54,54" fill="#00D9FF"/>
  <!-- Inner darker echoes inside each peak (visible at the base as the "A" wedges). -->
  <polygon points="16,54 24,28 30,54" fill="#039EBD"/>
  <polygon points="34,54 40,28 48,54" fill="#039EBD"/>
  <!-- Cloud overlay: white interior with a cyan stroke, positioned to span the central V. -->
  <path d="M14 38 Q9 38 9 33 Q9 27 15 26 Q17 19 25 19 Q31 17 33 23 Q39 21 44 26 Q50 27 50 33 Q50 38 44 38 Z"
        fill="#FFFFFF" stroke="#00D9FF" stroke-width="1.4" stroke-linejoin="round"/>
</svg>
