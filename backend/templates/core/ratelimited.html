{% extends "base.html" %}

{% block content %}
<section class="mx-auto max-w-2xl px-4 py-24 text-center">
  <p class="text-sm font-semibold uppercase tracking-wider text-slate-500">429</p>
  <h1 class="mt-2 text-3xl font-bold tracking-tight text-slate-900 sm:text-4xl">
    Too many requests
  </h1>
  <p class="mt-4 text-lg text-slate-600">
    You are sending requests faster than we allow. Please wait a few minutes
    and try again. If you believe this is an error, you can
    <a href="{% url 'contact' %}" class="font-medium text-sky-700 underline">contact us</a>.
  </p>
  <div class="mt-8">
    <a href="/" class="inline-flex items-center rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">
      Back to home
    </a>
  </div>
</section>
{% endblock %}
