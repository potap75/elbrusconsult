{% load static %}{% spaceless %}
<meta name="description" content="{{ seo_description|default:SITE_TAGLINE }}">
<meta name="robots" content="{{ seo_robots|default:'index,follow' }}">
<meta name="author" content="{{ SITE_NAME }}">
{# theme-color is declared in base.html alongside the favicon set, so all
   browser-chrome tints live in one place. #}

<link rel="canonical" href="{{ seo_canonical_url|default:default_canonical_url }}">

<meta property="og:site_name" content="{{ SITE_NAME }}">
<meta property="og:type" content="{{ seo_og_type|default:'website' }}">
<meta property="og:title" content="{{ seo_title|default:SITE_NAME }}">
<meta property="og:description" content="{{ seo_description|default:SITE_TAGLINE }}">
<meta property="og:url" content="{{ seo_canonical_url|default:default_canonical_url }}">
<meta property="og:image" content="{{ SITE_URL }}{{ seo_og_image|default:SITE_DEFAULT_OG_IMAGE }}">
<meta property="og:locale" content="en_US">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ seo_title|default:SITE_NAME }}">
<meta name="twitter:description" content="{{ seo_description|default:SITE_TAGLINE }}">
<meta name="twitter:image" content="{{ SITE_URL }}{{ seo_og_image|default:SITE_DEFAULT_OG_IMAGE }}">
{% if SITE_TWITTER_HANDLE %}<meta name="twitter:site" content="{{ SITE_TWITTER_HANDLE }}">{% endif %}
{% endspaceless %}
