{% extends "base.html" %}

{% block content %}
  <section class="mx-auto max-w-2xl px-4 sm:px-6 lg:px-8 py-24 text-center">
    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-slate-900">You've been unsubscribed.</h1>
    <p class="mt-4 text-slate-600">
      {{ subscriber.email }} will no longer receive newsletters from us. Sorry to see you go.
    </p>
    <a href="{% url 'home' %}"
       class="mt-8 inline-flex items-center rounded-md border border-slate-300 px-4 py-2 text-slate-700 hover:bg-slate-100">
      Back home
    </a>
  </section>
{% endblock %}
